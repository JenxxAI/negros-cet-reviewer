name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: negros-cet-reviewer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: negros-cet-reviewer

      - name: Run unit tests
        run: npm test
        working-directory: negros-cet-reviewer

      - name: Build
        run: npm run build
        working-directory: negros-cet-reviewer
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
